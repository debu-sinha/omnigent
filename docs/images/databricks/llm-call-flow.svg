  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="240" y="62" font-size="22" fill="#E60C7F" opacity="1"><tspan x="240" dy="0">LLM call flow: how Mosaic AI Gateway adds governance</tspan></text>
  <rect x="40" y="216" width="180" height="140" rx="8" stroke="#F53B9D" fill="#F53B9D" stroke-width="1" opacity="1" />
  <text x="60" y="242" font-size="14" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">1. omnigent agent</tspan></text>
  <text x="60" y="265" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">spec: model =</tspan></text>
  <text x="60" y="283" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">production-openai-</tspan></text>
  <text x="60" y="299" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">gateway</tspan></text>
  <text x="60" y="325" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">executor: openai-</tspan></text>
  <text x="60" y="341" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">agents-sdk</tspan></text>
  <path d="M 220 286 L 280 286" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <text x="225" y="276" font-size="10" fill="#E60C7F" opacity="1"><tspan x="225" dy="0">spawn-env</tspan></text>
  <rect x="280" y="216" width="180" height="140" rx="8" stroke="#F53B9D" fill="#F53B9D" stroke-width="1" opacity="1" />
  <text x="300" y="242" font-size="14" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">2. SDK subprocess</tspan></text>
  <text x="300" y="265" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">env:</tspan></text>
  <text x="300" y="283" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">OPENAI_BASE_URL=</tspan></text>
  <text x="300" y="299" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">  workspace/serving-</tspan></text>
  <text x="300" y="315" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">  endpoints</tspan></text>
  <text x="300" y="335" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">OPENAI_API_KEY=</tspan></text>
  <text x="300" y="351" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="300" dy="0">  DATABRICKS_TOKEN</tspan></text>
  <path d="M 460 286 L 520 286" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <text x="465" y="276" font-size="10" fill="#E60C7F" opacity="1"><tspan x="465" dy="0">POST</tspan></text>
  <rect x="520" y="216" width="180" height="140" rx="8" stroke="#4DC5A0" fill="#4DC5A0" stroke-width="1" opacity="1" />
  <text x="540" y="242" font-size="14" fill="#212529" opacity="1"><tspan x="540" dy="0">3. AI Gateway</tspan></text>
  <text x="540" y="265" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">production-openai-</tspan></text>
  <text x="540" y="283" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">gateway endpoint</tspan></text>
  <text x="540" y="303" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">PII guardrails BLOCK</tspan></text>
  <text x="540" y="319" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">rate limit 1000/min/user</tspan></text>
  <text x="540" y="335" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">usage tracking ON</tspan></text>
  <text x="540" y="351" font-size="11" fill="#212529" opacity="1"><tspan x="540" dy="0">audit logs to UC</tspan></text>
  <path d="M 700 286 L 760 286" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <text x="705" y="276" font-size="10" fill="#E60C7F" opacity="1"><tspan x="705" dy="0">forward</tspan></text>
  <rect x="760" y="216" width="180" height="140" rx="8" stroke="#4DC5A0" fill="#4DC5A0" stroke-width="1" opacity="1" />
  <text x="780" y="242" font-size="14" fill="#212529" opacity="1"><tspan x="780" dy="0">4. Backing provider</tspan></text>
  <text x="780" y="265" font-size="11" fill="#212529" opacity="1"><tspan x="780" dy="0">OpenAI gpt-4o-mini</tspan></text>
  <text x="780" y="291" font-size="11" fill="#212529" opacity="1"><tspan x="780" dy="0">or</tspan></text>
  <text x="780" y="315" font-size="11" fill="#212529" opacity="1"><tspan x="780" dy="0">Anthropic Claude</tspan></text>
  <text x="780" y="333" font-size="11" fill="#212529" opacity="1"><tspan x="780" dy="0">or Foundation Model</tspan></text>
  <text x="780" y="351" font-size="11" fill="#212529" opacity="1"><tspan x="780" dy="0">swap = config update</tspan></text>
  <rect x="40" y="416" width="900" height="80" rx="8" stroke="#4DC5A0" fill="#4DC5A0" stroke-width="1" opacity="1" />
  <text x="60" y="442" font-size="14" fill="#212529" opacity="1"><tspan x="60" dy="0">Captured in Unity Catalog:</tspan></text>
  <text x="60" y="465" font-size="11" fill="#212529" opacity="1"><tspan x="60" dy="0">  - per-key cost (input tokens + output tokens + rate)</tspan></text>
  <text x="60" y="483" font-size="11" fill="#212529" opacity="1"><tspan x="60" dy="0">  - audit log (request, response, latency, error_type if any)</tspan></text>
  <text x="500" y="465" font-size="11" fill="#212529" opacity="1"><tspan x="500" dy="0">  - PII guardrail events (blocked / passed)</tspan></text>
  <text x="500" y="483" font-size="11" fill="#212529" opacity="1"><tspan x="500" dy="0">  - rate limit events (capacity remaining, throttle)</tspan></text>
</svg>