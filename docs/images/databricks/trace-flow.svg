<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1030" height="576" viewBox="0 0 1030 576">
  <defs>
    <marker id="arrow-E60C7F" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E60C7F" />
    </marker>
    <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="240" y="62" font-size="22" fill="#E60C7F" opacity="1"><tspan x="240" dy="0">Trace flow: omnigent OTel spans into MLflow Tracing in UC</tspan></text>
  <rect x="40" y="136" width="200" height="140" rx="8" stroke="#F53B9D" fill="#F53B9D" stroke-width="1" opacity="1" />
  <text x="60" y="162" font-size="14" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">1. Agent turn</tspan></text>
  <text x="60" y="185" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">TracingContext emits:</tspan></text>
  <text x="60" y="203" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">  agent:debby (AGENT)</tspan></text>
  <text x="60" y="221" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">    llm_call (CHAT_MODEL)</tspan></text>
  <text x="60" y="239" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">    tool:calc (TOOL)</tspan></text>
  <text x="60" y="258" font-size="10" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">with gen_ai.* + tool.* attrs</tspan></text>
  <path d="M 240 206 L 290 206" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <rect x="290" y="136" width="200" height="140" rx="8" stroke="#F53B9D" fill="#F53B9D" stroke-width="1" opacity="1" />
  <text x="310" y="162" font-size="14" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">2. OTel SDK</tspan></text>
  <text x="310" y="185" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">BatchSpanProcessor</tspan></text>
  <text x="310" y="203" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">OTLPSpanExporter</tspan></text>
  <text x="310" y="221" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">http/protobuf</tspan></text>
  <text x="310" y="243" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">OTEL_EXPORTER_OTLP_</tspan></text>
  <text x="310" y="259" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="310" dy="0">ENDPOINT = workspace</tspan></text>
  <path d="M 490 206 L 540 206" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <text x="495" y="196" font-size="10" fill="#E60C7F" opacity="1"><tspan x="495" dy="0">POST</tspan></text>
  <rect x="540" y="136" width="200" height="140" rx="8" stroke="#4DC5A0" fill="#4DC5A0" stroke-width="1" opacity="1" />
  <text x="560" y="162" font-size="14" fill="#212529" opacity="1"><tspan x="560" dy="0">3. MLflow receiver</tspan></text>
  <text x="560" y="185" font-size="11" fill="#212529" opacity="1"><tspan x="560" dy="0">workspace endpoint:</tspan></text>
  <text x="560" y="203" font-size="11" fill="#212529" opacity="1"><tspan x="560" dy="0">/api/2.0/tracing/</tspan></text>
  <text x="560" y="221" font-size="11" fill="#212529" opacity="1"><tspan x="560" dy="0">v1/traces</tspan></text>
  <text x="560" y="243" font-size="11" fill="#212529" opacity="1"><tspan x="560" dy="0">decodes OTLP protobuf,</tspan></text>
  <text x="560" y="259" font-size="11" fill="#212529" opacity="1"><tspan x="560" dy="0">writes spans + attrs</tspan></text>
  <path d="M 740 206 L 790 206" stroke="#E60C7F" fill="none" stroke-width="2" opacity="1" marker-end="url(#arrow-E60C7F)" />
  <rect x="790" y="136" width="200" height="140" rx="8" stroke="#4DC5A0" fill="#4DC5A0" stroke-width="1" opacity="1" />
  <text x="810" y="162" font-size="14" fill="#212529" opacity="1"><tspan x="810" dy="0">4. Unity Catalog</tspan></text>
  <text x="810" y="185" font-size="11" fill="#212529" opacity="1"><tspan x="810" dy="0">governed trace table</tspan></text>
  <text x="810" y="203" font-size="11" fill="#212529" opacity="1"><tspan x="810" dy="0">searchable in UI</tspan></text>
  <text x="810" y="221" font-size="11" fill="#212529" opacity="1"><tspan x="810" dy="0">mlflow.search_traces()</tspan></text>
  <text x="810" y="243" font-size="11" fill="#212529" opacity="1"><tspan x="810" dy="0">UC RBAC + audit</tspan></text>
  <text x="810" y="259" font-size="11" fill="#212529" opacity="1"><tspan x="810" dy="0">retention per UC policy</tspan></text>
  <rect x="40" y="336" width="950" height="200" rx="8" stroke="#F53B9D" fill="#F53B9D" stroke-width="1" opacity="1" />
  <text x="60" y="362" font-size="14" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">After the trace lands, search in MLflow UI by trace_id (hex of response_id):</tspan></text>
  <text x="60" y="389" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">trace_id = d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3</tspan></text>
  <text x="60" y="415" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">agent:debby                  gen_ai.operation.name=invoke_agent  gen_ai.agent.name=debby</tspan></text>
  <text x="60" y="435" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">  llm_call                  gen_ai.operation.name=chat  gen_ai.provider.name=databricks</tspan></text>
  <text x="60" y="455" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">                            gen_ai.usage.input_tokens=1523  output_tokens=847</tspan></text>
  <text x="60" y="475" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">  tool:calculator           gen_ai.operation.name=execute_tool  tool.name=calculator</tspan></text>
  <text x="60" y="500" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="60" dy="0">Operators filter by gen_ai.provider.name, gen_ai.request.model, or tool.name.</tspan></text>
</svg>